name: Deploy to Hugging Face Space

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate required secrets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          test -n "$HF_TOKEN"
          test -n "$HF_SPACE_REPO"

      - name: Sync and push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          HF_USERNAME="${HF_SPACE_REPO%%/*}"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git clone "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}" space_repo
          rsync -a --delete --exclude '.git/' --exclude '.github/' ./ space_repo/
          cp README.space.md space_repo/README.md
          cd space_repo
          git add -A
          if git diff --cached --quiet; then
            echo "No deployment changes detected."
            exit 0
          fi
          git commit -m "Deploy from GitHub Actions"
          git push origin main
